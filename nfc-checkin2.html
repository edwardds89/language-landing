<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>You earned Pin Gems! — LanguagePin</title>
<link rel="icon" type="image/png" href="logo_tab.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800;900&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --teal:#0a7da0; --tealD:#085f7a; --tealDD:#053f52;
    --orange:#EB8826; --orangeB:#FFB060;
    --cream:#F5EFE0; --cream60:rgba(245,239,224,.6);
  }
  html,body{height:100%}
  body{
    font-family:'Plus Jakarta Sans','Helvetica Neue',Arial,sans-serif;
    background:radial-gradient(120% 90% at 50% 0%, var(--teal) 0%, var(--tealDD) 100%);
    color:var(--cream);
    display:flex;align-items:center;justify-content:center;
    padding:24px 20px; overflow:hidden; text-align:center;
  }
  .card{max-width:420px;width:100%;position:relative;animation:cardIn .7s cubic-bezier(.2,1.4,.4,1) both}
  @keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.92)}to{opacity:1;transform:none}}

  .logo{display:flex;align-items:center;justify-content:center;gap:8px;font-weight:900;font-size:1.05rem;margin-bottom:26px;opacity:.95}
  .logo img{width:26px;height:auto}
  .logo b{color:var(--orangeB)}

  /* gem */
  .gem-wrap{position:relative;width:130px;height:130px;margin:0 auto 6px}
  .gem-main{width:100%;height:100%;animation:gemFloat 3s ease-in-out 1.2s infinite, gemPop .8s cubic-bezier(.2,1.6,.4,1) .25s both;filter:drop-shadow(0 10px 30px rgba(235,136,38,.45))}
  @keyframes gemPop{from{transform:scale(0) rotate(-25deg)}to{transform:scale(1) rotate(0)}}
  @keyframes gemFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  .ring{position:absolute;inset:0;border-radius:50%;border:3px solid var(--orange);opacity:0;animation:ring 1.6s ease-out .45s 2}
  @keyframes ring{0%{transform:scale(.6);opacity:.7}100%{transform:scale(1.9);opacity:0}}
  .sparkle{position:absolute;font-size:1.1rem;opacity:0;animation:spark 1.8s ease-in-out infinite}
  .s1{top:-4px;right:8px;animation-delay:1.2s}
  .s2{bottom:6px;left:-6px;animation-delay:1.9s}
  .s3{top:22px;left:-14px;animation-delay:2.6s;font-size:.85rem}
  @keyframes spark{0%,100%{opacity:0;transform:scale(.4) rotate(0)}50%{opacity:1;transform:scale(1) rotate(25deg)}}

  h1{font-size:clamp(1.5rem,6.4vw,1.9rem);font-weight:900;letter-spacing:-.8px;line-height:1.22;margin:14px 0 8px}
  h1 .hl{color:var(--orangeB)}
  .sub{color:var(--cream60);font-size:.95rem;line-height:1.6;margin-bottom:26px}

  .counter-box{
    background:rgba(245,239,224,.07);
    border:1.5px solid rgba(235,136,38,.55);
    border-radius:20px;padding:22px 18px 20px;margin-bottom:12px;
    box-shadow:0 12px 36px rgba(0,0,0,.25);
    animation:boxIn .6s cubic-bezier(.2,1.4,.4,1) .5s both;
  }
  @keyframes boxIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  .counter-label{font-size:.74rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--orangeB);margin-bottom:6px}
  .counter{font-size:3.4rem;font-weight:900;letter-spacing:-2px;line-height:1;display:inline-flex;align-items:center;gap:10px}
  .counter .mini-gem{width:34px;height:34px}
  .counter.bump{animation:bump .45s cubic-bezier(.2,1.8,.4,1)}
  @keyframes bump{0%{transform:scale(1)}40%{transform:scale(1.22)}100%{transform:scale(1)}}

  .streak{font-size:.85rem;color:var(--cream60);margin-bottom:28px}
  .streak b{color:var(--cream)}

  .cta{
    display:block;background:var(--orange);color:#fff;text-decoration:none;
    padding:16px 28px;border-radius:14px;font-weight:800;font-size:1rem;
    box-shadow:0 8px 26px rgba(235,136,38,.4);
    animation:boxIn .6s cubic-bezier(.2,1.4,.4,1) .75s both;
  }
  .cta:active{transform:scale(.97)}
  .foot{margin-top:16px;font-size:.75rem;color:var(--cream60);animation:boxIn .6s ease .9s both}

  /* flying gems */
  .fly{position:fixed;bottom:-40px;pointer-events:none;z-index:5;animation:fly linear both}
  @keyframes fly{
    0%{transform:translateY(0) scale(var(--s)) rotate(0);opacity:0}
    12%{opacity:1}
    100%{transform:translateY(var(--dist)) scale(var(--s)) rotate(var(--rot));opacity:0}
  }
  /* confetti */
  .conf{position:fixed;top:-14px;width:9px;height:9px;border-radius:2px;pointer-events:none;z-index:4;animation:confFall linear both}
  @keyframes confFall{
    0%{transform:translateY(0) rotate(0);opacity:1}
    90%{opacity:1}
    100%{transform:translateY(105vh) rotate(var(--spin));opacity:0}
  }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <g id="pin-gem">
      <polygon points="50,6 78,22 90,50 50,96 10,50 22,22" fill="#EB8826"/>
      <polygon points="50,6 78,22 50,38 22,22" fill="#FFB060"/>
      <polygon points="90,50 78,22 50,38 50,96" fill="#C96E10"/>
      <polygon points="10,50 22,22 50,38 50,96" fill="#EB8826"/>
      <polygon points="50,38 50,96 10,50" fill="#D97A1B"/>
      <polygon points="38,26 48,20 44,30" fill="#F5EFE0" opacity=".85"/>
    </g>
  </defs>
</svg>

<div class="card">
  <div class="logo"><img src="https://languagepin.co.uk/logo.png" alt=""> Language<b>Pin</b></div>

  <div class="gem-wrap">
    <div class="ring"></div>
    <svg class="gem-main" viewBox="0 0 100 100"><use href="#pin-gem"/></svg>
    <span class="sparkle s1">✨</span>
    <span class="sparkle s2">✨</span>
    <span class="sparkle s3">✨</span>
  </div>

  <h1 id="headline">Thanks for practising<br><span id="venueLine">in the real world</span>!</h1>
  <p class="sub">Your real-world practice just paid off.</p>

  <div class="counter-box">
    <div class="counter-label">Pin Gems earned</div>
    <div class="counter" id="counterWrap">
      <svg class="mini-gem" viewBox="0 0 100 100"><use href="#pin-gem"/></svg>
      <span id="counter">0</span>
    </div>
  </div>

  <p class="streak">Keep checking in to grow your <b>streak</b> and unlock rewards 🔥</p>

  <a class="cta" href="https://languagepin.co.uk" id="cta">Open LanguagePin →</a>
  <p class="foot">Practice with AI. Then go speak it for real.</p>
</div>

<script>
(function(){
  // ── personalizzazione via URL: nfc-checkin.html?lang=French&venue=Bar%20Vittoria&gems=50
  var q = new URLSearchParams(location.search);
  var venue = q.get('venue');
  var gems  = Math.max(1, parseInt(q.get('gems') || '50', 10) || 50);
  // Se un locale è specificato nell'URL, mostra "at [Nome]"; altrimenti resta generico
  var venueLine = document.getElementById('venueLine');
  if (venue && venue.trim()) {
    venueLine.innerHTML = 'at <span class="hl">' + venue.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</span>';
  } else {
    venueLine.innerHTML = 'in the real world';
  }

  // ── contatore animato 0 → gems
  var el = document.getElementById('counter'), wrap = document.getElementById('counterWrap');
  var D = 1600, t0 = null;
  function ease(t){ return 1 - Math.pow(1 - t, 3); }
  function step(ts){
    if (!t0) t0 = ts;
    var p = Math.min(1, (ts - t0) / D);
    el.textContent = Math.round(ease(p) * gems);
    if (p < 1) requestAnimationFrame(step);
    else { wrap.classList.add('bump'); if (navigator.vibrate) navigator.vibrate(60); }
  }
  setTimeout(function(){ requestAnimationFrame(step); }, 650);

  // ── gems che volano verso l'alto
  function flyGem(delay){
    var s = document.createElementNS('http://www.w3.org/2000/svg','svg');
    s.setAttribute('viewBox','0 0 100 100');
    s.innerHTML = '<use href="#pin-gem"/>';
    s.className.baseVal = 'fly';
    var size = 18 + Math.random()*26;
    s.style.width = size + 'px';
    s.style.left = (5 + Math.random()*90) + 'vw';
    s.style.setProperty('--s', (0.7 + Math.random()*0.6).toFixed(2));
    s.style.setProperty('--dist', '-' + (55 + Math.random()*45) + 'vh');
    s.style.setProperty('--rot', (Math.random()<.5?'-':'') + (120 + Math.random()*240) + 'deg');
    s.style.animationDuration = (2.2 + Math.random()*1.8) + 's';
    s.style.animationDelay = delay + 's';
    document.body.appendChild(s);
    setTimeout(function(){ s.remove(); }, (delay + 4.5) * 1000);
  }
  for (var i = 0; i < 14; i++) flyGem(0.4 + i * 0.22);
  // ondata leggera continua
  setInterval(function(){ flyGem(0); flyGem(0.3); }, 2600);

  // ── confetti iniziali
  var colors = ['#EB8826','#FFB060','#F5EFE0','#0d9bc8'];
  for (var c = 0; c < 26; c++){
    var d = document.createElement('div');
    d.className = 'conf';
    d.style.left = Math.random()*100 + 'vw';
    d.style.background = colors[c % colors.length];
    d.style.setProperty('--spin', (Math.random()<.5?'-':'') + (200 + Math.random()*400) + 'deg');
    d.style.animationDuration = (2.4 + Math.random()*2) + 's';
    d.style.animationDelay = (Math.random()*0.9) + 's';
    document.body.appendChild(d);
  }
  setTimeout(function(){ document.querySelectorAll('.conf').forEach(function(e){ e.remove(); }); }, 6000);

  // ── il bottone conserva i parametri (utile per futuro deep link)
  document.getElementById('cta').href = 'https://languagepin.co.uk/?utm_source=nfc&utm_medium=venue&utm_campaign=' + encodeURIComponent(venue || 'generic');
})();
</script>
</body>
</html>
